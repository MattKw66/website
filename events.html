<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events — Maciej Kwaśnikowski, Tenor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css" />
<link rel="stylesheet" href="mobile.css" />
<style>

  body {
    font-family: 'Jost', sans-serif;
    background: #0e0e0e;
    color: #f0ece4;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* PAGE HEADER */
  .page-header {
    padding: 4rem 3rem 2.5rem;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: baseline;
    gap: 2rem;
  }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 300;
    color: #f0ece4;
    letter-spacing: 0.02em;
  }

  .page-subtitle {
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* EVENTS LIST */
  .events-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 3rem;
    width: 100%;
  }

  /* YEAR DIVIDER */
  .year-divider {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding: 4rem 0 1.5rem;
  }

  .year-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    flex-shrink: 0;
  }

  .year-line {
    flex: 1;
    height: 1px;
    background: #2a2520;
  }

  /* SINGLE EVENT */
  .event {
    display: grid;
    grid-template-columns: 76px 1fr auto;
    gap: 0 2rem;
    padding: 3.2rem 0;
    border-bottom: 1px solid #161616;
    align-items: start;
    transition: background 0.2s;
  }

  .event:hover .event-opera { color: #c9b99a; }

  /* DATE COLUMN */
  .event-date {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding-top: 0.15rem;
  }

  .event-month {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #888;
  }

  .event-day {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.9rem;
    font-weight: 300;
    color: #c9b99a;
    line-height: 1;
    margin: 0.1rem 0;
  }

  .event-year-small {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .event-role {
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #c9b99a;
    margin-bottom: 0.4rem;
  }

  .event-opera {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem;
    font-weight: 400;
    color: #f0ece4;
    line-height: 1.1;
    transition: color 0.2s;
    margin-bottom: 0.25rem;
  }

  .event-composer {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: #998878;
    margin-bottom: 0.6rem;
  }

  .event-venue {
    font-size: 0.88rem;
    color: #666;
    letter-spacing: 0.04em;
  }

  .event-venue span {
    color: #666;
    margin: 0 0.4rem;
  }

  /* MULTI-DATE BADGE */
  .event-dates-right {
    text-align: right;
    padding-top: 0.2rem;
  }

  .event-dates-list {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 2;
    letter-spacing: 0.05em;
  }

  .event-link {
    display: inline-block;
    margin-top: 0.8rem;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.1rem;
    transition: color 0.2s, border-color 0.2s;
  }

  .event-link:hover {
    color: #c9b99a;
    border-color: #c9b99a44;
  }

  /* CONCERT (no role) */
  .event-type-concert .event-role {
    color: #888;
  }

  /* UPCOMING — brighter palette */
  .event:not(.past) .event-month { color: #b0a898; }
  .event:not(.past) .event-year-small { color: #b0a898; }
  .event:not(.past) .event-composer { color: #c4b090; }
  .event:not(.past) .event-venue { color: #a09888; }
  .event:not(.past) .event-dates-list { color: #a09888; }
  .event:not(.past) .event-link { color: #a09888; border-bottom-color: #3a3530; }

  /* PAST indicator */
  .event.past .event-opera { color: #666; }
  .event.past .event-day { color: #7a6e5a; }
  .event.past .event-role { color: #5a4e3a; }
  .event.past .event-composer { color: #504840; }
  .event.past .event-venue { color: #504840; }
  .event.past .event-dates-list { color: #504840; }
  .event.past:hover .event-opera { color: #888; }</style>
</head>
<body>

<div data-include="nav"></div>

<div class="page-header">
  <h1 class="page-title" data-i18n="events_title">Upcoming Events</h1>
  <p class="page-subtitle" data-i18n="events_subtitle">2025 — 2026 Season</p>
</div>

<main>
<div class="events-container">
  <!-- Events render automatically from the EVENTS array in events.js.
       Do NOT hand-edit here — edit the array in events.js instead. -->
</div>
</main>

<div data-include="footer"></div>

<script src="layout.js"></script>
<script src="events.js"></script>
<script src="translations.js"></script>
<script src="lang.js"></script>
</body>
</html>
