<!DOCTYPE html>
<html lang="en" data-i18n-title="title_contact">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Maciej Kwaśnikowski, Tenor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="site.css" />
<link rel="stylesheet" href="mobile.css" />

  <style>

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 4rem 4rem 2.5rem;
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--gold);
      line-height: 1.1;
    }

    .page-header p {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 4rem 4rem 5rem;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 3.5rem;
    }

    /* ── CONTACT BLOCK ── */
    .contact-block {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding-bottom: 3.5rem;
      border-bottom: 1px solid var(--border);
    }

    .contact-block:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .contact-label {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .contact-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .contact-detail {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.6rem;
    }

    .contact-detail a {
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s, opacity 0.2s;
    }

    .contact-detail a:hover {
      color: var(--text);
    }

    .contact-detail .phone {
      color: var(--gold-dim);
      font-size: 0.9rem;
    }</style>
</head>
<body>

  <!-- NAV -->
  <div data-include="nav"></div>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <h1 data-i18n="contact_title">Contact</h1>
    <p data-i18n="contact_subtitle">Bookings &amp; enquiries</p>
  </header>

  <!-- MAIN -->
  <main>

    <!-- Agent -->
    <div class="contact-block">
      <p class="contact-label" data-i18n="contact_mgmt_label">Artist management</p>
      <p class="contact-name">Agence Artistique Thérèse Cédelle</p>
      <div class="contact-detail">
        <a href="mailto:agence.cedelle@gmail.com">agence.cedelle@gmail.com</a>
      </div>
      <div class="contact-detail">
        <span class="phone">+33 1 49 53 00 02</span>
      </div>
    </div>

    <!-- Personal -->
    <div class="contact-block">
      <p class="contact-label" data-i18n="contact_direct_label">Direct contact</p>
      <p class="contact-name">Maciej Kwaśnikowski</p>
      <div class="contact-detail">
        <a href="mailto:contact@maciejkwasnikowski.com">contact@maciejkwasnikowski.com</a>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <div data-include="footer"></div>
  <script src="layout.js"></script>
<script src="translations.js"></script>
<script src="lang.js"></script>
</body>
</html>
