<!DOCTYPE html>
<html lang="en" data-i18n-title="title_press">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Press — Maciej Kwaśnikowski, Tenor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css" />
<link rel="stylesheet" href="mobile.css" />
<style>

  body {
    font-family: 'Jost', sans-serif;
    background: var(--bg);
    color: #f0ece4;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* PAGE HEADER */
  .page-header {
    padding: 4rem 3rem 2.5rem;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: baseline;
    gap: 2rem;
  }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 300;
    color: #f0ece4;
    letter-spacing: 0.02em;
  }

  .page-subtitle {
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #444;
  }

  /* MAIN CONTENT */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 3rem;
    width: 100%;
  }

  /* PRODUCTION BLOCK */
  .production {
    padding: 3.5rem 0;
    border-bottom: 1px solid #161616;
  }

  .production-header {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0 2rem;
    align-items: baseline;
    margin-bottom: 2.5rem;
  }

  .production-opera {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: #f0ece4;
  }

  .production-meta {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .production-role {
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .production-detail {
    font-size: 0.72rem;
    color: #444;
    letter-spacing: 0.04em;
  }

  /* REVIEWS GRID */
  .reviews {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  .reviews.single {
    grid-template-columns: 1fr;
    max-width: 600px;
  }

  .review {
    border-left: 1px solid #1e1e1e;
    padding-left: 1.5rem;
  }

  .review-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-style: italic;
    font-weight: 300;
    line-height: 1.7;
    color: #aaa;
    margin-bottom: 1rem;
  }

  .review-quote::before {
    content: '\201C';
    color: var(--gold);
    font-size: 1.4rem;
    line-height: 0;
    vertical-align: -0.3em;
    margin-right: 0.1em;
  }

  .review-quote::after {
    content: '\201D';
    color: var(--gold);
    font-size: 1.4rem;
    line-height: 0;
    vertical-align: -0.3em;
    margin-left: 0.1em;
  }

  .review-source {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }

  .review-author {
    font-size: 0.7rem;
    color: #555;
    letter-spacing: 0.04em;
  }

  .review-publication {
    font-size: 0.68rem;
    letter-spacing: 0.06em;
  }

  .review-publication a {
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid #c9b99a33;
    transition: border-color 0.2s;
  }

  .review-publication a:hover {
    border-color: var(--gold);
  }

  /* language flag for non-english reviews */
  .review-lang {
    display: inline-block;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #333;
    border: 1px solid #2a2a2a;
    padding: 0.1rem 0.4rem;
    margin-left: 0.5rem;
    vertical-align: middle;
  }</style>
</head>
<body>

<div data-include="nav"></div>

<div class="page-header">
  <h1 class="page-title" data-i18n="press_title">Press</h1>
  <p class="page-subtitle" data-i18n="press_subtitle">Selected reviews</p>
</div>

<main>

  <div class="press-container">
  <!-- Reviews render automatically from the PRODUCTIONS array in press.js.
       Do NOT hand-edit here — edit the array in press.js instead. -->
</div>
</main>

<div data-include="footer"></div>

<script src="layout.js"></script>
<script src="press.js"></script>
<script src="translations.js"></script>
<script src="lang.js"></script>
</body>
</html>
